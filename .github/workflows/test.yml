name: test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  rust:
    name: rust-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Cache cargo
        # Pin to v2.7.7 so `save-always` is honoured.  The moving `@v2`
        # tag resolved to a version that skipped the post-step on
        # timeout (see run #82), leaving no cache behind and causing
        # an infinite cold-compile loop.
        uses: Swatinem/rust-cache@v2.7.7
        with:
          workspaces: src-tauri -> target
          save-always: true
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev protobuf-compiler
      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: choco install -y --no-progress protoc 2>&1 | tail -n 5
      - name: Build tests
        # Split compile from test execution so that the cache post-step
        # can persist compiled artifacts even if a later step fails.
        working-directory: src-tauri
        timeout-minutes: 180
        env:
          RUST_BACKTRACE: 1
          CARGO_PROFILE_DEV_DEBUG: "0"
        run: cargo build --tests --features grpc,channels,did-identity,crdt-sync
      - name: Install cargo-nextest
        # nextest provides per-test timeouts (--timeout 120s) which
        # kill hanging tests instead of letting them block the entire
        # suite for 60 minutes.  Without this, one hanging integration
        # test (e.g. a gRPC server waiting for a connection) blocks all
        # subsequent tests when running with --test-threads=1.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Test
        # nextest runs each test in its own process with a 2-min
        # timeout.  Hanging tests are killed and reported as failures
        # instead of blocking the suite indefinitely.
        working-directory: src-tauri
        timeout-minutes: 90
        env:
          RUST_BACKTRACE: 1
        run: cargo nextest run --features grpc,channels,did-identity,crdt-sync --no-fail-fast --timeout 120s -j 1
      - name: Lint
        working-directory: src-tauri
        run: cargo clippy --features grpc,channels,did-identity,crdt-sync -- -D warnings
      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      # v1.0.1 P0#02: audit Rust dependencies against the RustSec
      # advisory database. `--locked` pins cargo-audit's own deps
      # to Cargo.lock so the install is reproducible.
      - name: Install cargo-audit
        working-directory: src-tauri
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        working-directory: src-tauri
        # `--deny warnings` would also fail on unmaintained crates
        # (warnings, not vulnerabilities); we keep audit at
        # vulnerability-level only so unmaintained crates can be
        # triaged in their own PR.
        run: cargo audit

  web:
    name: web-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - name: Upload coverage
        if: success()
        run: echo "coverage upload placeholder"
