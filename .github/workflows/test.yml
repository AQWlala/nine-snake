name: test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  rust:
    name: rust-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Cache cargo
        # Pin to v2.7.7 — the moving `@v2` tag resolved to a version
        # that skipped the post-step on timeout (see run #82), leaving
        # no cache behind and causing an infinite cold-compile loop.
        # v2.7.7 does NOT support `save-always` (that was added in a
        # later major); the correct option here is `cache-on-failure`.
        # `prefix-key: v2-` invalidates the old (possibly partial)
        # caches from runs #81–#85 that were saved without the test
        # binaries — this is the "clean cache" step.
        uses: Swatinem/rust-cache@v2.7.7
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          prefix-key: v2-
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev protobuf-compiler
      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: choco install -y --no-progress protoc 2>&1 | tail -n 5
      - name: Build tests
        # Split compile from test execution so that the cache post-step
        # can persist compiled artifacts even if a later step fails.
        working-directory: src-tauri
        timeout-minutes: 180
        env:
          RUST_BACKTRACE: 1
          CARGO_PROFILE_DEV_DEBUG: "0"
        run: cargo build --tests --features grpc,channels,did-identity,crdt-sync
      - name: Install cargo-nextest
        # nextest provides per-test timeouts (--timeout 120s) which
        # kill hanging tests instead of letting them block the entire
        # suite for 60 minutes.  Without this, one hanging integration
        # test (e.g. a gRPC server waiting for a connection) blocks all
        # subsequent tests when running with --test-threads=1.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Verify cargo-nextest
        # Debug step: run #85's Test step failed in 0.0 min (immediate
        # failure, not a timeout).  Print the nextest version and PATH
        # so the log shows whether the binary is actually callable
        # before we rely on it.
        working-directory: src-tauri
        run: |
          which cargo-nextest || where cargo-nextest || true
          cargo nextest --version
      - name: Test
        # nextest runs each test in its own process.  Per-test timeouts
        # are configured via `slow-timeout` in .config/nextest.toml
        # (the `--timeout` CLI flag does NOT exist in v0.9.x — using
        # it causes exit code 2, which is why runs #85 and #86 failed
        # in 0.0 min).  Hanging tests are killed after 120s (2 × 60s
        # periods) and reported as failures instead of blocking the
        # suite indefinitely.
        # Keep CARGO_PROFILE_DEV_DEBUG=0 to match the build step —
        # otherwise nextest would rebuild with full debug info.
        # Output is captured to nextest-output.txt so the follow-up
        # step can extract failed test names as GitHub annotations
        # (the logs API returns 403, so we need annotations to see
        # which tests failed).
        working-directory: src-tauri
        timeout-minutes: 90
        shell: bash
        env:
          RUST_BACKTRACE: 1
          CARGO_PROFILE_DEV_DEBUG: "0"
        run: |
          set -o pipefail
          cargo nextest run --features grpc,channels,did-identity,crdt-sync --no-fail-fast --test-threads 1 2>&1 | tee nextest-output.txt
      - name: Report failed tests
        # Extract failed test names from nextest output and print them
        # as GitHub Actions error annotations, which are visible via
        # the check-runs annotations API (no auth needed).
        #
        # IMPORTANT: GitHub Actions' default bash shell runs with
        # `set -e -o pipefail`.  We disable both with `set +e +o pipefail`
        # so the script always runs to completion even when grep finds
        # no matches (grep returns exit code 1 on no match).
        #
        # GitHub limits annotations to 10 per step, so we print the
        # most important lines first (failures > summary > tail).
        #
        # We grep for multiple patterns to catch ALL nextest failure types:
        #   * "panicked at"  — Rust panic messages (file:line + message)
        #   * "FAIL"         — nextest's FAIL result lines
        #   * "CANCEL"       — nextest's timeout/cancelled test lines
        #   * "Terminating"  — nextest's slow-timeout kill message
        #   * "ERROR"        — nextest's binary setup error lines
        #   * "ABORT"        — nextest's aborted test lines
        #   * "Summary"      — nextest's summary line (pass/fail counts)
        if: always()
        working-directory: src-tauri
        shell: bash
        run: |
          set +e +o pipefail
          echo "=== Test result summary ==="
          if [ -f nextest-output.txt ]; then
            echo "File size: $(wc -c < nextest-output.txt) bytes, $(wc -l < nextest-output.txt) lines"
            # Collect all failure-related lines into one stream,
            # prioritised: panics first, then FAIL, then CANCEL, etc.
            failures=$(grep -E "panicked at|FAIL|CANCEL|Terminating|ERROR|ABORT" nextest-output.txt | head -n 10)
            if [ -n "$failures" ]; then
              echo "--- Failures (as annotations) ---"
              echo "$failures" | while IFS= read -r line; do
                echo "::error::$line"
              done
            else
              echo "--- No standard failure lines found ---"
              echo "::error::No failure lines (FAIL/CANCEL/ERROR/panicked) found in output"
            fi
            # nextest summary line (may contain pass/fail counts)
            summary=$(grep -E "Summary|Tests:|TEST RESULT|tests? run" nextest-output.txt)
            if [ -n "$summary" ]; then
              echo "--- Summary ---"
              echo "$summary"
            fi
            # Always print the full output to the log (not as annotations)
            # so we can debug even when annotations are truncated.
            echo "=== Full nextest output ==="
            cat nextest-output.txt
          else
            echo "::error::nextest-output.txt not found — Test step may not have run"
          fi
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-output-${{ matrix.os }}
          path: src-tauri/nextest-output.txt
          retention-days: 7
      - name: Lint
        working-directory: src-tauri
        run: cargo clippy --features grpc,channels,did-identity,crdt-sync -- -D warnings
      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      # v1.0.1 P0#02: audit Rust dependencies against the RustSec
      # advisory database. `--locked` pins cargo-audit's own deps
      # to Cargo.lock so the install is reproducible.
      - name: Install cargo-audit
        working-directory: src-tauri
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        working-directory: src-tauri
        # `--deny warnings` would also fail on unmaintained crates
        # (warnings, not vulnerabilities); we keep audit at
        # vulnerability-level only so unmaintained crates can be
        # triaged in their own PR.
        run: cargo audit

  web:
    name: web-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - name: Upload coverage
        if: success()
        run: echo "coverage upload placeholder"
